asyncapi: 3.1.0
info:
  title: AFB <-> BF Execution Protocol
  version: 1.5.0
  description: >-
    Business protocol between AFB (OMS) and BF (executor daemon), wire version
    afb.execution.v1. Every message is a signed JSON envelope (Ed25519 over a
    canonical signing string). Transport v1 is WebSocket; the envelope is
    transport-agnostic (MQTT and others planned).
  license:
    name: Proprietary
defaultContentType: application/json
servers:
  afb-ws:
    host: 127.0.0.1:8013
    pathname: /bf/v1
    protocol: ws
    description: AFB WebSocket endpoint; BF connects as a client.
channels:
  afbBf:
    address: /bf/v1
    title: AFB <-> BF envelope channel
    description: Single bidirectional channel carrying all signed envelopes.
    messages:
      session_hello:
        $ref: '#/components/messages/session_hello'
      session_heartbeat:
        $ref: '#/components/messages/session_heartbeat'
      session_resync_request:
        $ref: '#/components/messages/session_resync_request'
      session_hello_ack:
        $ref: '#/components/messages/session_hello_ack'
      session_resync_response:
        $ref: '#/components/messages/session_resync_response'
      daemon_status:
        $ref: '#/components/messages/daemon_status'
      daemon_capabilities:
        $ref: '#/components/messages/daemon_capabilities'
      daemon_error:
        $ref: '#/components/messages/daemon_error'
      daemon_capabilities_query:
        $ref: '#/components/messages/daemon_capabilities_query'
      daemon_restart:
        $ref: '#/components/messages/daemon_restart'
      broker_get_account:
        $ref: '#/components/messages/broker_get_account'
      broker_get_orders:
        $ref: '#/components/messages/broker_get_orders'
      broker_get_catalog:
        $ref: '#/components/messages/broker_get_catalog'
      broker_get_instrument:
        $ref: '#/components/messages/broker_get_instrument'
      broker_resolve_instrument:
        $ref: '#/components/messages/broker_resolve_instrument'
      broker_account:
        $ref: '#/components/messages/broker_account'
      broker_orders:
        $ref: '#/components/messages/broker_orders'
      broker_catalog:
        $ref: '#/components/messages/broker_catalog'
      broker_instrument:
        $ref: '#/components/messages/broker_instrument'
      broker_instrument_resolved:
        $ref: '#/components/messages/broker_instrument_resolved'
      deal_publish:
        $ref: '#/components/messages/deal_publish'
      deal_operation:
        $ref: '#/components/messages/deal_operation'
      deal_amend:
        $ref: '#/components/messages/deal_amend'
      deal_resync:
        $ref: '#/components/messages/deal_resync'
      deal_signal:
        $ref: '#/components/messages/deal_signal'
      deal_accepted:
        $ref: '#/components/messages/deal_accepted'
      deal_rejected:
        $ref: '#/components/messages/deal_rejected'
      deal_status_changed:
        $ref: '#/components/messages/deal_status_changed'
