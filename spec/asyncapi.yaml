      - $ref: '#/channels/afbBf/messages/deal_rejected'
      - $ref: '#/channels/afbBf/messages/deal_status_changed'
      - $ref: '#/channels/afbBf/messages/deal_archived'
      - $ref: '#/channels/afbBf/messages/deal_orders_synced'
